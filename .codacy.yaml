---
# Codacy repository configuration.
#
# The bulk of this workspace is machine-generated OPC UA wire types
# (~375 files / ~345k LOC under */src/generated/, generated from the
# OPC UA NodeSet XML schemas by async-opcua-codegen). Every generated
# type emits structurally identical BinaryEncodable/BinaryDecodable/
# MessageInfo (+ JSON/XML) impls that differ only in field names, so
# Codacy's clone detector reports them as massive "duplication". That
# is a false signal: the generator is the source of truth and the
# output is never hand-edited or hand-deduplicated. Excluding it (and
# the test/fuzz harnesses) keeps Codacy's findings focused on the
# hand-written, maintained source.
exclude_paths:
  # Auto-generated OPC UA types — the dominant source of false-positive
  # duplication. Never hand-edited (verify-clean-codegen CI enforces this).
  - "**/generated/**"
  # Test harnesses: large, intentionally repetitive setup (e.g. the
  # security-policy × mode matrix, integration-test scaffolding).
  - "**/tests/**"
  # Fuzz targets and external/codegen test crates — boilerplate, not
  # production code.
  - "fuzz/**"
  - "codegen-tests/**"
  - "dotnet-tests/**"
  # Parallel encoding backends. OPC UA mandates three wire encodings
  # (binary / XML / JSON), so every hand-written codec exists in triplicate
  # by encoding — e.g. src/custom/{custom_struct(binary),xml,json}.rs,
  # src/{node_id,variant}/{xml,json}.rs, src/xml/. These per-encoding files
  # share the same field-walk structure and differ only in the encoder API,
  # so Codacy reports them as file-level duplicates. It is mandated parallelism,
  # not copy-paste to deduplicate (the binary/XML/JSON encoder models are
  # fundamentally different and cannot be unified). The binary "primary"
  # (e.g. custom_struct.rs) stays analyzed; the XML/JSON parallels are excluded.
  - "**/json.rs"
  - "**/xml.rs"
  - "**/xml/**"
  # Vendored third-party C/C++ (open62541 interop examples). Not async-opcua
  # source; carries its own cppcheck/flawfinder findings (usleep, missing
  # system includes) that we neither own nor maintain.
  - "3rd-party/**"
  # Spec-Kit tooling and feature specs. `.specify/` is regenerated framework
  # scaffolding (bash helpers we don't maintain) and `specs/` is planning
  # markdown — neither is shipped product code.
  - ".specify/**"
  - "specs/**"
  # Generated/curated release notes — markdown-lint nits, not code quality.
  - "CHANGELOG.md"
