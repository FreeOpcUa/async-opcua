name: Run and verify clippy
'on':
  workflow_call: null
jobs:
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Provision toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          toolchain: stable

      - name: Run clippy
        # --all-targets lints tests/benches/examples (not just lib+bins) and
        # --all-features covers optional code (sqlite, pubsub, mqtt, ...) that
        # the default-feature build skips. The feature-restricted runs below
        # still guard the no-default / xml-only / json-only gating paths.
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      
      - name: No default features
        run: cargo clippy --locked -p async-opcua --no-default-features -- -D warnings

      - name: Just xml
        run: cargo clippy --locked -p async-opcua --no-default-features --features xml -- -D warnings

      - name: Just json
        run: cargo clippy --locked -p async-opcua --no-default-features --features json -- -D warnings
