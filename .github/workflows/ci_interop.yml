name: Interop conformance harness

# Drives the demo server with four independent OPC UA stacks (node-opcua, open62541, asyncua and
# the OPC Foundation .NET Standard reference stack) across the conformance surface — the repeatable
# substitute for the official UACTT.
'on':
  workflow_call:
    inputs:
      external_endpoint:
        description: Optional OPC UA endpoint for portable external implementation checks.
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      external_endpoint:
        description: Optional OPC UA endpoint for portable external implementation checks.
        required: false
        type: string
        default: ''

jobs:
  interop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Provision toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          toolchain: stable

      - name: Provision .NET 8 SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '8.0.x'

      # libssl-dev + cmake + a C toolchain are needed to build open62541 with OpenSSL
      # encryption; libelf-dev is pulled in by the demo server's --all-features build;
      # python3-venv lets the asyncua harness pip-install asyncua into a local venv.
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev cmake build-essential libelf-dev python3-venv

      # Node.js / npm are preinstalled on ubuntu-latest runners.
      - name: node-opcua interop harness
        run: ./samples/demo-server/interop/run-interop.sh

      - name: open62541 interop harness
        run: ./samples/demo-server/interop/open62541/run-open62541.sh

      # Python 3 is preinstalled; asyncua is installed into a venv by the runner.
      - name: asyncua interop harness
        run: ./samples/demo-server/interop/asyncua/run-asyncua.sh

      # The OPC Foundation reference stack (OPC UA .NET Standard) — the implementation the UACTT
      # is built on; the most comprehensive of the four harnesses (~65 checks).
      - name: .NET (OPC Foundation reference) interop harness
        run: ./samples/demo-server/interop/dotnet/run-dotnet.sh

  external-interop:
    if: ${{ inputs.external_endpoint != '' }}
    runs-on: ubuntu-latest
    env:
      OPCUA_EXTERNAL_ENDPOINT: ${{ inputs.external_endpoint }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Provision .NET 8 SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '8.0.x'

      - name: Install asyncua dependencies
        run: sudo apt-get update && sudo apt-get install -y python3-venv

      - name: .NET portable external interop harness
        run: ./samples/demo-server/interop/dotnet/run-dotnet.sh --external "$OPCUA_EXTERNAL_ENDPOINT" --security auto

      - name: asyncua portable external interop harness
        run: ./samples/demo-server/interop/asyncua/run-asyncua.sh --external "$OPCUA_EXTERNAL_ENDPOINT"
