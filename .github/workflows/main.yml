name: OPC UA for Rust

on:
  push:
    branches: [ master, rewrite-master ]
  pull_request:
    branches: [ master, rewrite-master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Dependency-advisory gate (feature 009 / FR-022 / SEC-P1). cargo-deny-action v2
  # bundles a cargo-deny new enough to parse CVSS 4.0 advisories. Policy + recorded
  # exceptions live in deny.toml.
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check advisories bans sources

  build-linux:
    strategy:
      matrix:
        toolchain:
          - stable
          - beta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Provision toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          toolchain: ${{ matrix.toolchain }}
      # libelf is needed by libbpf-sys, pulled in by xsk-rs when the
      # pubsub tsn feature is enabled via --all-features.
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libelf-dev
      - name: Build
        run: cargo check --locked
      - name: Run tests
        run: cargo test --verbose --locked --all-features

  # Feature-graph build matrix (feature 009 / SC-008). Every supported feature
  # configuration must compile warning-free under -D warnings. The sample binaries
  # legitimately require json/xml, so the --no-default-features leg scopes to the
  # library crates; default and --all-features cover the full workspace.
  build-matrix:
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-D warnings"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            args: --workspace
          - name: all-features
            args: --workspace --all-features
          - name: no-default-features
            args: >-
              --no-default-features
              -p async-opcua -p async-opcua-types -p async-opcua-core
              -p async-opcua-crypto -p async-opcua-client -p async-opcua-server
              -p async-opcua-nodes
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Provision toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          toolchain: stable
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libelf-dev
      - name: Build (${{ matrix.name }})
        run: cargo build --locked ${{ matrix.args }}

  footprint:
    uses: ./.github/workflows/ci_footprint.yml

  test-external-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Provision toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          toolchain: stable
      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 8.0.x
      - name: Build .NET
        run: dotnet build
      - name: Run tests against external server
        run: cargo run --bin external-tests --locked

  code-coverage:
    uses: ./.github/workflows/ci_code_coverage.yml

  clippy:
    uses: ./.github/workflows/ci_clippy.yml

  verify-clean-codegen:
    uses: ./.github/workflows/ci_verify_clean_codegen.yml

  interop:
    uses: ./.github/workflows/ci_interop.yml

  check_for_release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      tag_exists: ${{ steps.should-release.outputs.tag_exists }}
      branch: ${{ steps.branch.outputs.branch }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-tags: true
      - name: Provision toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          toolchain: stable
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Get branch name
        id: branch
        run: echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> "$GITHUB_OUTPUT"
      - name: Get version from Cargo.toml, and check that it is consistent.
        id: get-version
        run: echo "version=$(./tools/check_version_numbers.sh)" >> "$GITHUB_OUTPUT"

      - name: Check if we should release a new version
        id: should-release
        run: echo "tag_exists=$(git tag --list '${{ steps.get-version.outputs.version }}' | wc -l | sed s/\ //g)" >> $GITHUB_OUTPUT

      - name: Log release status
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            if (${{ steps.should-release.outputs.tag_exists }} == 0) {
              core.warning('Will release async-opcua version ${{ steps.get-version.outputs.version }}')
            } else {
              core.notice('Will not create release for version ${{ steps.get-version.outputs.version }} because it already exists.')
            }

  release:
    runs-on: ubuntu-latest
    needs: check_for_release
    environment: CD
    if: ${{ needs.check_for_release.outputs.tag_exists == 0 && needs.check_for_release.outputs.branch == 'master'}}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-tags: true
      - name: Provision toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          toolchain: stable

      - name: Install cargo-release
        run: cargo install cargo-release

      - name: Create tag
        uses: rickstaa/action-create-tag@a1c7777fcb2fee4f19b0f283ba888afa11678b72 # v1
        id: "tag_create"
        with:
          tag: ${{ needs.check_for_release.outputs.version }}
          tag_exists_error: true
          message: Async OPC-UA version ${{ needs.check_for_release.outputs.version }}

      - name: Create github release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.check_for_release.outputs.version }}
          generate_release_notes: true

      - name: Publish
        run: cargo release $(./tools/release-package-args.sh) --execute
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
