# Demo-server configuration for the node-opcua interop smoke test (run-interop.sh).
#
# Companion no-trust config (port 4856): trust_client_certs is FALSE, so an unknown client
# certificate is rejected. Used by the interop harness to test discarded-certificate handling.
# A trimmed copy of sample.server.test.conf with only modern security policies, so it
# validates and runs on the default build (no `legacy-crypto` feature required). The
# server auto-trusts client certs (trust_client_certs), so the secured handshake completes
# unattended.
---
application_name: OPC UA Demo Server (interop no-trust)
application_uri: "urn:async-opcua-interop-server-notrust"
product_uri: "urn:async-opcua-interop"
create_sample_keypair: true
certificate_path: own/cert.der
private_key_path: private/private.pem
certificate_validation:
  trust_client_certs: false
  check_time: true
pki_dir: "./interop/pki-notrust"
tcp_config:
  hello_timeout: 5
  host: 127.0.0.1
  port: 4856
limits:
  clients_can_modify_address_space: false
  max_array_length: 1000
  max_string_length: 65535
  max_byte_string_length: 65535
  subscriptions:
    max_subscriptions_per_session: 100
    max_pending_publish_requests: 20
    max_publish_requests_per_subscription: 4
    max_monitored_items_per_sub: 8
    max_monitored_item_queue_size: 10
    min_sampling_interval_ms: 0.1
    min_publishing_interval_ms: 0.1
locale_ids:
  - en
user_tokens:
  sample_password_user1:
    user: sample1
    # argon2id hash of 'sample1_password' (env_expansion is NOT enabled, so the literal
    # $-delimited hash is fine here).
    pass: '$argon2id$v=19$m=19456,t=2,p=1$o5cBVGrPxzTv5huzTf+wAQ$q/S1fHoqhAIUodKMOH/mIXcigw16yZ7RpdJThx6+/A4'
discovery_urls:
  - "opc.tcp://127.0.0.1:4856/"
default_endpoint: ~
endpoints:
  aes128-sha256-rsaoaep_sign_encrypt:
    path: /
    security_policy: Aes128-Sha256-RsaOaep
    security_mode: SignAndEncrypt
    security_level: 12
    password_security_policy: ~
    user_token_ids:
      - ANONYMOUS
      - sample_password_user1
  basic256sha256_sign:
    path: /
    security_policy: Basic256Sha256
    security_mode: Sign
    security_level: 4
    password_security_policy: ~
    user_token_ids:
      - ANONYMOUS
      - sample_password_user1
  basic256sha256_sign_encrypt:
    path: /
    security_policy: Basic256Sha256
    security_mode: SignAndEncrypt
    security_level: 14
    password_security_policy: ~
    user_token_ids:
      - ANONYMOUS
      - sample_password_user1
  aes256-sha256-rsapss_sign_encrypt:
    path: /
    security_policy: Aes256-Sha256-RsaPss
    security_mode: SignAndEncrypt
    security_level: 16
    password_security_policy: ~
    user_token_ids:
      - ANONYMOUS
      - sample_password_user1
  none:
    path: /
    security_policy: None
    security_mode: None
    security_level: 0
    password_security_policy: ~
    user_token_ids:
      - ANONYMOUS
      - sample_password_user1
