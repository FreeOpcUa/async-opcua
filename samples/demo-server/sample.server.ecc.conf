# ECC conformance profile for the demo server (feature 020).
#
# A server has a SINGLE ApplicationInstance certificate and an RSA certificate
# cannot perform ECDSA, so the RSA demo profile (sample.server.test.conf) cannot
# also serve ECC policies. This is the separate ECC profile: launch it with
#   cargo run -p async-opcua-demo-server -- --ecc p256 --config sample.server.ecc.conf
# (or `--ecc p384`). The `--ecc` flag provisions an EC ApplicationInstance cert
# into this profile's PKI `own/`+`private/` dirs before the server starts;
# `create_sample_keypair` is therefore false here (the sample keypair is RSA).
---
application_name: OPC UA Sample Server (ECC)
application_uri: "urn:${computername}"
product_uri: "urn:OPC UA Sample Server Testkit"
create_sample_keypair: false
certificate_path: own/cert.der
private_key_path: private/private.pem
certificate_validation:
  trust_client_certs: true
  check_time: true
pki_dir: "./pki-ecc"
#discovery_server_url: ""
tcp_config:
  hello_timeout: 5
  # Host must be the computer name and must match settings in test app
  host: ${computername}
  # Distinct port from the RSA profile (4855) so both can run side by side.
  port: 4856
limits:
  clients_can_modify_address_space: false
  max_subscriptions: 100
  max_monitored_items_per_sub: 1000
  max_monitored_item_queue_size: 10
  max_array_length: 1000
  max_string_length: 65535
  max_byte_string_length: 65535
  min_sampling_interval: 0.1
  min_publishing_interval: 0.1
locale_ids:
  - en
user_tokens:
  sample_password_user1:
    user: sample1
    pass: '$argon2id$v=19$m=19456,t=2,p=1$YXN5bmMtb3BjdWEtc2FtcGxlMQ$8GTJkwyBFS+/km9tDJ431EXuaZ0w4edCnzEG0Gz2tSE'
  sample_password_user2:
    user: sample2
    pass: '$argon2id$v=19$m=19456,t=2,p=1$YXN5bmMtb3BjdWEtc2FtcGxlMg$/D4GPVW4YhwFD/ppsn+STvqoXQwKZImBYAdumkKGMhQ'
  sample_x509_user:
    user: sample_x509
    x509: "./users/sample-x509.der"
discovery_urls:
  - "opc.tcp://${computername}:4856/"
default_endpoint: ~
endpoints:
  ecc_nistp256_sign:
    path: /
    security_policy: ECC_nistP256
    security_mode: Sign
    security_level: 5
    password_security_policy: ~
    user_token_ids:
      - ANONYMOUS
      - sample_password_user1
      - sample_password_user2
      - sample_x509_user
  ecc_nistp256_sign_encrypt:
    path: /
    security_policy: ECC_nistP256
    security_mode: SignAndEncrypt
    security_level: 15
    password_security_policy: ~
    user_token_ids:
      - ANONYMOUS
      - sample_password_user1
      - sample_password_user2
      - sample_x509_user
  ecc_nistp384_sign:
    path: /
    security_policy: ECC_nistP384
    security_mode: Sign
    security_level: 6
    password_security_policy: ~
    user_token_ids:
      - ANONYMOUS
      - sample_password_user1
      - sample_password_user2
      - sample_x509_user
  ecc_nistp384_sign_encrypt:
    path: /
    security_policy: ECC_nistP384
    security_mode: SignAndEncrypt
    security_level: 16
    password_security_policy: ~
    user_token_ids:
      - ANONYMOUS
      - sample_password_user1
      - sample_password_user2
      - sample_x509_user
