application_name: OPC UA Sample Server
application_uri: urn:async-opcua-Sample-Server
product_uri: urn:async-opcua-Sample-Server-Testkit
create_sample_keypair: true
certificate_path: own/cert.der
private_key_path: private/private.pem
certificate_validation:
  trust_client_certs: false
  check_time: true
pki_dir: ./pki
# discovery_server_url: opc.tcp://localhost:4840/UADiscovery
tcp_config:
  hello_timeout: 5
  host: 0.0.0.0
  port: 4840
limits:
  max_array_length: 100000
  max_string_length: 65535
  max_byte_string_length: 65535
  max_message_size: 327675
  max_chunk_count: 5
  send_buffer_size: 65535
  receive_buffer_size: 65535
  max_browse_continuation_points: 5000
  max_history_continuation_points: 500
  max_query_continuation_points: 500
  max_sessions: 20
  max_inflight_requests_per_connection: 512
  max_unactivated_sessions_per_channel: 5
  unactivated_session_timeout_ms: 10000
  subscriptions:
    max_subscriptions_per_session: 100
    max_pending_publish_requests: 20
    max_publish_requests_per_subscription: 4
    min_sampling_interval_ms: 100
    min_publishing_interval_ms: 100
    max_keep_alive_count: 30000
    default_keep_alive_count: 10
    max_monitored_items_per_sub: 10000
    max_monitored_item_queue_size: 10
    max_lifetime_count: 90000
    max_notifications_per_publish: 0
    max_queued_notifications: 20
  operational:
    max_nodes_per_translate_browse_paths_to_node_ids: 100
    max_nodes_per_read: 10000
    max_nodes_per_write: 10000
    max_nodes_per_method_call: 100
    max_nodes_per_browse: 1000
    max_nodes_per_register_nodes: 1000
    max_monitored_items_per_call: 1000
    max_nodes_per_history_read_data: 100
    max_nodes_per_history_read_events: 100
    max_nodes_per_history_update: 100
    max_references_per_browse_node: 1000
    max_node_descs_per_query: 100
    max_data_sets_query_return: 1000
    max_references_query_return: 100
    max_nodes_per_node_management: 1000
    max_references_per_references_management: 1000
    max_subscriptions_per_call: 10
locale_ids:
- en
user_tokens:
  sample_password_user:
    user: sample1
    pass: '$argon2id$v=19$m=19456,t=2,p=1$YXN5bmMtb3BjdWEtc2FtcGxlMQ$8GTJkwyBFS+/km9tDJ431EXuaZ0w4edCnzEG0Gz2tSE'
    read_diagnostics: true
  sample_x509_user:
    user: sample_x509
    x509: ./users/sample-x509.der
  unused_user:
    user: unused
    pass: '$argon2id$v=19$m=19456,t=2,p=1$YXN5bmMtb3BjdWEtdW51c2VkMQ$GQSqyx/2ndUHBrz3h8ywlEHhYkd32ukpLdWmeUMxxxE'
discovery_urls:
- opc.tcp://localhost:4855/
default_endpoint: null
endpoints:
  aes128-sha256-rsaoaep_sign:
    path: /quackdcs/infra-001
    security_policy: Aes128-Sha256-RsaOaep
    security_mode: Sign
    security_level: 2
    password_security_policy: null
    user_token_ids:
    - ANONYMOUS
    - sample_password_user
    - sample_x509_user
  aes128-sha256-rsaoaep_sign_encrypt:
    path: /quackdcs/infra-001
    security_policy: Aes128-Sha256-RsaOaep
    security_mode: SignAndEncrypt
    security_level: 12
    password_security_policy: null
    user_token_ids:
    - ANONYMOUS
    - sample_password_user
    - sample_x509_user
  aes256-sha256-rsapss_sign:
    path: /quackdcs/infra-001
    security_policy: Aes256-Sha256-RsaPss
    security_mode: Sign
    security_level: 5
    password_security_policy: null
    user_token_ids:
    - ANONYMOUS
    - sample_password_user
    - sample_x509_user
  aes256-sha256-rsapss_sign_encrypt:
    path: /quackdcs/infra-001
    security_policy: Aes256-Sha256-RsaPss
    security_mode: SignAndEncrypt
    security_level: 15
    password_security_policy: null
    user_token_ids:
    - ANONYMOUS
    - sample_password_user
    - sample_x509_user
  basic256sha256_sign:
    path: /quackdcs/infra-001
    security_policy: Basic256Sha256
    security_mode: Sign
    security_level: 4
    password_security_policy: null
    user_token_ids:
    - ANONYMOUS
    - sample_password_user
    - sample_x509_user
  basic256sha256_sign_encrypt:
    path: /quackdcs/infra-001
    security_policy: Basic256Sha256
    security_mode: SignAndEncrypt
    security_level: 14
    password_security_policy: null
    user_token_ids:
    - ANONYMOUS
    - sample_password_user
    - sample_x509_user
  no_access:
    path: /quackdcs/infra-001noaccess
    security_policy: None
    security_mode: None
    security_level: 0
    password_security_policy: null
    user_token_ids: []
  none:
    path: /quackdcs/infra-001
    security_policy: None
    security_mode: None
    security_level: 0
    password_security_policy: null
    user_token_ids:
    - ANONYMOUS
    - sample_password_user
    - sample_x509_user
